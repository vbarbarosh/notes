<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coding Sandbox</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    --bg:#0b0d10; --panel:#111419; --panel-2:#0d1014; --border:#20262e;
    --fg:#e7eaf0; --muted:#8b94a3; --muted2:#aab2c0;
    --accent-fg:#fff; --hover:#1a1f27; --active:#1f2733; --scroll:#2a313b; --guide:#283039;
    --accent:#3b82f6; --folder:#d8ab46;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px; background:var(--bg); color:var(--fg);
  }
  body.light{
    --bg:#eceef1; --panel:#fff; --panel-2:#f4f6f8; --border:#e3e7ec;
    --fg:#1b2027; --muted:#737c88; --muted2:#5b636e;
    --hover:#eef1f5; --active:#e7eef8; --scroll:#cdd3da; --guide:#e1e5ea; --folder:#bd8f2c;
  }
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted);background-clip:padding-box}
  ::-webkit-scrollbar-corner{background:transparent}

  .CodeMirror{height:100% !important;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;line-height:1.65;font-variant-ligatures:none;font-feature-settings:"liga" 0,"calt" 0,"dlig" 0}
  .CodeMirror-gutters{border-right:1px solid var(--border)}
  .cm-s-default.CodeMirror{background:var(--panel);color:var(--fg)}
  .cm-s-default .CodeMirror-gutters{background:var(--panel);border-color:var(--border)}
  .cm-s-default .CodeMirror-linenumber{color:var(--muted)}
  .cm-s-default .CodeMirror-cursor{border-color:var(--fg)}
  .cm-s-material-darker.CodeMirror{background:#0e1116}
  .cm-s-material-darker .CodeMirror-gutters{background:#0e1116;border-color:var(--border)}
  .CodeMirror-scrollbar-filler,.CodeMirror-gutter-filler{background:transparent !important}

  #app{position:fixed;inset:0;display:flex;flex-direction:column}
  .topbar{height:46px;flex:none;display:flex;align-items:center;gap:11px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--border)}
  .logo{width:24px;height:24px;border-radius:7px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace}
  .title-txt{font-weight:650;font-size:14px;letter-spacing:-.01em;color:var(--fg);cursor:text}
  .main{flex:1;display:flex;min-height:0;min-width:0}

  .sidebar{flex:none;display:flex;flex-direction:column;background:var(--panel);min-height:0;overflow:hidden}
  .sb-head{height:40px;flex:none;display:flex;align-items:center;gap:6px;padding:0 8px 0 14px}
  .sb-label{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase}
  .search-wrap{padding:4px 10px 8px;position:relative}
  .search-wrap > svg{position:absolute;left:20px;top:calc(50% - 2px);transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .search-wrap input{width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;color:var(--fg);font:inherit;font-size:12.5px;padding:7px 28px 7px 32px;outline:none}
  .search-wrap #search-clear{position:absolute;right:18px;top:calc(50% - 2px);transform:translateY(-50%);display:flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0;border:none;border-radius:5px;background:transparent;color:var(--muted);cursor:pointer}
  .search-wrap #search-clear:hover{background:var(--border);color:var(--fg)}
  .search-wrap #search-clear[hidden]{display:none}
  .tree{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 0 10px}
  .sb-foot{height:34px;flex:none;display:flex;align-items:center;padding:0 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}

  .row{display:flex;align-items:center;min-height:36px;padding:4px 8px;margin:2px 6px;border-radius:8px;cursor:pointer;user-select:none}
  .row:hover{background:var(--hover)}
  .row.active{background:var(--active)}
  .row.folder.activedir{background:color-mix(in srgb, var(--folder) 13%, transparent)}
  .row .acts{opacity:0;transition:opacity .12s;display:flex;align-items:center;flex:none}
  .row:hover .acts,.row.active .acts,.row.menuopen .acts{opacity:1}
  .guide{width:13px;flex:none;display:flex;justify-content:center;align-self:stretch}
  .guide span{width:1px;background:transparent}
  .caret{width:18px;flex:none;display:grid;place-items:center;color:var(--muted);cursor:pointer;transition:transform .12s}
  .ico{display:grid;place-items:center;flex:none;margin-right:10px}
  .ico.folder{color:var(--folder)}
  .ico.file{color:var(--muted)}
  .nm{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row.folder .nm{font-size:13.5px;font-weight:650;color:var(--fg)}
  .row.file .nm{font-size:13.5px;color:var(--muted2)}
  .row.file.active .nm{color:var(--fg)}
  .cnt{font-size:11px;color:var(--muted);opacity:.5;margin-left:6px}
  .star{color:var(--accent);display:grid;place-items:center;flex:none;margin-left:5px}
  .lock{color:var(--muted);display:grid;place-items:center;flex:none;margin-left:5px;opacity:.75}
  .row.file.active .lock{color:var(--accent);opacity:1}
  .ro-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--muted);background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;margin-left:8px;text-transform:uppercase;letter-spacing:.04em}
  .ro-pill svg{width:11px;height:11px}
  .rn-input{flex:0 1 auto;min-width:0;width:150px;background:var(--panel-2);border:1px solid var(--accent);border-radius:5px;color:var(--fg);font:inherit;padding:1px 6px;outline:none}
  .row.folder .rn-input{font-size:12.5px;font-weight:600}
  .row.file .rn-input{font-size:13px}
  .kebab{width:24px;height:24px;padding:0;display:grid;place-items:center;border:0;border-radius:5px;background:transparent;color:var(--muted);cursor:pointer}
  .kebab:hover{background:var(--panel-2);color:var(--fg)}
  .row.menuopen .kebab{background:var(--panel-2);color:var(--fg)}

  .iconbtn{display:grid;place-items:center;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer}
  .iconbtn:hover{background:var(--hover);color:var(--fg)}
  .iconbtn.sm{width:26px;height:26px}
  .iconbtn.md{width:28px;height:28px}
  .iconbtn.lg{width:30px;height:30px}
  .iconbtn.xl{width:32px;height:32px;border-color:var(--border)}
  .iconbtn.on{background:var(--active);color:var(--accent);border-color:var(--border)}

  .resizer{flex:none;cursor:col-resize;background:var(--border);opacity:.55}
  .resizer:hover{background:var(--accent);opacity:1}
  .resizer.col{width:6px}

  .split{flex:1;display:flex;min-width:0;min-height:0}
  .editor-col,.preview-col{display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .editor-col{background:var(--panel)}
  .preview-col{background:var(--panel-2)}
  .pane-head{height:40px;flex:none;display:flex;align-items:center;gap:8px;padding:0 8px;background:var(--panel);border-bottom:1px solid var(--border)}
  .fname{font-size:12.5px;color:var(--fg);font-weight:550;cursor:text}
  .fname-input{font-size:12.5px;font-weight:550;color:var(--fg);background:var(--panel-2);border:1px solid var(--accent);border-radius:5px;padding:2px 7px;outline:none;width:210px}
  .cm-host{flex:1;min-height:0;position:relative}
  #cm-host{position:absolute;inset:0;overflow:hidden;background:var(--panel)}
  #editor-msg{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:13px;background:var(--panel);text-align:center;padding:24px;z-index:6}
  iframe.preview{flex:1;width:100%;border:0;background:var(--panel-2);min-height:0}
  #tree{display:flex;flex-direction:column}#tree>*{flex:none}
  #preview-stack{flex:1;position:relative;min-height:0}
  iframe.pv{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--panel-2)}
  #json-frame,#drawio-frame,#excalidraw-frame{z-index:2}

  .console{flex:none;display:flex;flex-direction:column;border-top:1px solid var(--border);background:var(--panel);height:180px}
  .console-head{height:32px;flex:none;display:flex;align-items:center;gap:8px;padding:0 8px 0 14px;border-bottom:1px solid var(--border)}
  .console-body{flex:1;overflow-y:auto;min-height:0}
  .log{padding:4px 14px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;display:flex}
  .log .tag{opacity:.7;margin-right:8px;font-weight:600;text-transform:uppercase;font-size:10px}
  .badge{font-size:10px;font-weight:700;color:var(--accent-fg);background:var(--accent);border-radius:9px;padding:1px 6px}
  .badge.empty{background:var(--muted);opacity:.4}
  .smallbtn{height:24px;padding:0 9px;display:grid;place-items:center;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px}
  .smallbtn:hover{background:var(--hover);color:var(--fg)}

  .popover{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:9px;box-shadow:0 10px 30px rgba(0,0,0,.30);padding:4px;min-width:174px;z-index:51}
  .popover .item{padding:7px 11px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--fg)}
  .popover .item:hover{background:var(--hover)}
  .popover .item.danger{color:#ef4444}
  .popover .item.sep{border-top:1px solid var(--border);margin-top:4px;padding-top:9px}
  .backdrop{position:fixed;inset:0;z-index:50}
  .empty-msg{padding:24px 16px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6}
  .trash-divider{margin:10px 12px 2px;border-top:1px solid var(--border)}
  .row.trashrow .nm{text-decoration:line-through;opacity:.8;color:var(--muted)}
  .row.drop-target{background:var(--active);box-shadow:inset 0 0 0 1px var(--accent)}
  #dropzone{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(59,130,246,.14);pointer-events:none}
  #dropzone.show{display:flex}
  #dropzone .dz-card{pointer-events:none;background:var(--panel);border:2px dashed var(--accent);border-radius:14px;padding:28px 38px;color:var(--fg);font-weight:600;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 18px 54px rgba(0,0,0,.4)}
  #dropzone .dz-card svg{color:var(--accent)}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);z-index:120;background:var(--panel);color:var(--fg);border:1px solid var(--border);border-radius:10px;padding:10px 15px;font-size:12.5px;font-weight:550;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;display:flex;align-items:center;gap:8px;max-width:70vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast svg{color:var(--accent);flex:none}

  .modal-back{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.42);backdrop-filter:blur(2px)}
  .modal-back.show{display:flex}
  .modal{width:420px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.45);overflow:hidden}
  .modal-h{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
  .modal-h h2{margin:0;font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--fg)}
  .modal-h p{margin:3px 0 0;font-size:12px;color:var(--muted)}
  .modal-b{padding:16px 20px}
  .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tpl{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--border);border-radius:11px;cursor:pointer;background:var(--panel-2);transition:border-color .12s,background .12s}
  .tpl:hover{border-color:color-mix(in srgb, var(--accent) 40%, var(--border))}
  .tpl.sel{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 11%, var(--panel))}
  .tpl .tpl-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;background:var(--panel);border:1px solid var(--border)}
  .tpl.sel .tpl-ic{background:var(--panel)}
  .tpl .tpl-tx{min-width:0}
  .tpl .tpl-nm{font-size:13px;font-weight:600;color:var(--fg)}
  .tpl .tpl-ex{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',ui-monospace,monospace}
  .modal-field{margin-top:16px}
  .modal-field label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  #nf-name{width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13.5px;color:var(--fg);font-family:'JetBrains Mono',ui-monospace,monospace;outline:none}
  #nf-name:focus{border-color:var(--accent)}
  #nf-err{font-size:11.5px;color:#ef4444;margin-top:6px;min-height:14px}
  .modal-f{display:flex;justify-content:flex-end;gap:9px;padding:14px 20px 18px}
  .mbtn{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--panel-2);color:var(--fg);white-space:nowrap}
  .mbtn:hover{background:var(--hover)}
  .mbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .mbtn.primary:hover{filter:brightness(1.07)}
  .mbtn.primary:disabled{opacity:.5;cursor:not-allowed;filter:none}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">&lt;/&gt;</div>
    <div id="title-host" style="display:flex;align-items:center"></div>
    <div style="flex:1"></div>
    <button class="iconbtn xl" id="theme-btn" title="Toggle theme"></button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <span class="sb-label">Snippets</span>
        <button class="iconbtn sm" id="zip-btn" title="Export all snippets as .zip">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h6l2 2h7a1 1 0 0 1 1 1z"></path><path d="M12 10v6M9.5 13.5 12 16l2.5-2.5"></path></svg>
        </button>
        <div style="flex:1"></div>
        <button class="iconbtn md" id="newfile-btn" title="New snippet">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"></path><path d="M5 3h9l5 5v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"></path><path d="M12 11v6M9 14h6"></path></svg>
        </button>
        <button class="iconbtn md" id="newfolder-btn" title="New folder">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"></path><path d="M12 11v5M9.5 13.5h5"></path></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3-3"></path></svg>
        <input type="text" id="search" placeholder="Search snippets">
        <button type="button" id="search-clear" aria-label="Clear search" hidden><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button>
      </div>
      <div class="tree" id="tree"></div>
      <div class="sb-foot"><span id="footcount"></span></div>
    </div>
    <div class="resizer col" id="sb-resizer" title="Drag to resize"></div>
    <div class="split" id="split">
      <div class="editor-col" id="editor-col">
        <div class="pane-head">
          <button class="iconbtn lg" id="toggle-sb" title="Toggle file panel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M9 4v16"></path></svg>
          </button>
          <span style="color:var(--accent);display:grid;place-items:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m8 9-3 3 3 3M16 9l3 3-3 3"></path></svg>
          </span>
          <div id="fname-host" style="display:flex;align-items:center;flex:1;min-width:0"></div>
          <button class="iconbtn lg" id="copy-btn" title="Copy to clipboard"></button>
          <button class="iconbtn lg" id="export-btn" title="Export as .html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"></path></svg>
          </button>
        </div>
        <div class="cm-host"><div id="cm-host"></div><div id="editor-msg"></div></div>
      </div>
      <div class="resizer col" id="split-resizer" title="Drag to resize"></div>
      <div class="preview-col" id="preview-col">
        <div class="pane-head" style="padding:0 8px 0 14px">
          <span style="color:var(--muted);display:grid;place-items:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"></path></svg>
          </span>
          <span id="preview-label" style="font-size:12px;color:var(--muted);font-weight:550">Preview</span>
          <div style="flex:1"></div>
          <button class="iconbtn lg" id="refresh-btn" title="Refresh preview">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"></path><path d="M21 4v5h-5"></path></svg>
          </button>
          <button class="iconbtn lg" id="newtab-btn" title="Open in new tab">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6M20 4 10 14M19 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6"></path></svg>
          </button>
          <button class="iconbtn lg" id="console-btn" title="Toggle console">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 3 3-3 3M13 15h5"></path><rect x="3" y="4" width="18" height="16" rx="2"></rect></svg>
          </button>
        </div>
        <div id="preview-stack">
          <iframe class="pv" id="preview" title="preview" sandbox="allow-scripts allow-modals allow-popups allow-forms allow-pointer-lock allow-presentation"></iframe>
          <iframe class="pv" id="json-frame" title="JSON" style="display:none" sandbox="allow-scripts allow-popups"></iframe>
          <iframe class="pv" id="drawio-frame" title="diagram" style="display:none" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox"></iframe>
          <iframe class="pv" id="excalidraw-frame" title="excalidraw" style="display:none" sandbox="allow-scripts allow-same-origin allow-popups allow-downloads allow-modals"></iframe>
        </div>
        <div id="console-host"></div>
      </div>
    </div>
  </div>
</div>
<div id="popover-host"></div>
<div id="toast"></div>
<div id="dropzone"><div class="dz-card"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 8l5-5 5 5"></path><path d="M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"></path></svg><span>Drop files or folders to import</span></div></div>
<div id="newfile-modal" class="modal-back">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-h">
      <h2>New file</h2>

    if(cm2){ return [name.slice(0, name.length-cm2[1].length), cm2[1]]; }

  function defaultBaseForType(type){ var tpl=templateForType(type); if(tpl){ var b=splitExt(tpl.name)[0]; if(b) return b; } return 'untitled'; }
  function uniqueFileName(name, folderId){
    var taken={}; S.files.forEach(function(f){ if((f.folderId||null)===(folderId||null)) taken[(f.name||'').toLowerCase()]=1; });
    if(!taken[(name||'').toLowerCase()]) return name;
    var parts=splitExt(name), base=parts[0], ext=parts[1];
    var i=2, cand; do{ cand=base+'_'+i+ext; i++; }while(taken[cand.toLowerCase()]);
    return cand;
  }
  function importFileObj(file, parentId, created, idx){
    return readDroppedFile(file).then(function(d){
      var nf={id:uid(), name:uniqueFileName(file.name||('file-'+(idx||0)), parentId||null), folderId:parentId||null, content:d.content};
      if(d.binary){ nf.binary=true; nf.mime=d.mime; }
      if(folderChainReadonly(parentId||null)) nf.readonly=true;
      S.files.push(nf); created.files.push(nf);

  }
  function handleExternalDrop(e, destFolderId){
    var dt=e.dataTransfer; if(!dt) return;
    var items=dt.items, roots=[];
    if(items && items.length){
      for(var i=0;i<items.length;i++){
        var it=items[i];
        var en=it.webkitGetAsEntry?it.webkitGetAsEntry():null;
        if(en && en.isDirectory){ roots.push({dir:en}); }
        else { var fl=it.getAsFile?it.getAsFile():null; if(fl) roots.push({file:fl}); else if(en) roots.push({fileEntry:en}); }
      }
    }
    if(!roots.length && dt.files){ for(var k=0;k<dt.files.length;k++) roots.push({file:dt.files[k]}); }
    var created={files:[], folders:[]};
    var work=(function run(i){
      if(i>=roots.length) return Promise.resolve();
      var r=roots[i], p;
      if(r.dir) p=walkEntry(r.dir, destFolderId||null, created);
      else if(r.file) p=importFileObj(r.file, destFolderId||null, created, i+1);
      else p=walkEntry(r.fileEntry, destFolderId||null, created);
      return p.then(function(){ return run(i+1); });
    })(0);
    work.then(function(){
      if(destFolderId){ var p=folderById(destFolderId); if(p) p.collapsed=false; }
      if(created.files.length){ captureViewState(); S.activeId=created.files[0].id; headerRenaming=false; save(); loadActiveIntoEditor(); updatePreview(); renderAll(); if(cm) setTimeout(function(){ cm.focus(); },0); }
      else { save(); renderAll(); }
    });
  }

  /* ---------- export / copy / zip ---------- */
  function downloadFile(id){
    var f=fileById(id); if(!f) return;
    if(f._pending || f._error){ showToast('File is still loading \u2014 try again in a moment'); return; }
    var blob = f.binary ? dataURLtoBlob(f.content) : new Blob([String(f.content||'')], {type:(f.mime||'text/plain')+';charset=utf-8'});
    download(blob, f.name);
  }
  function download(blob, name){
    var url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
  }
  function exportActive(){ var f=activeFile(); if(!f) return; if(f._pending || f._error){ showToast('File is still loading \u2014 try again in a moment'); return; } if(f.binary){ download(dataURLtoBlob(f.content), f.name); return; } download(new Blob([f.content],{type:'text/html'}), /\.html?$/i.test(f.name)?f.name:f.name+'.html'); }
  function openNewTab(){ var f=activeFile(); if(!f) return; if(f._pending || f._error){ showToast('File is still loading \u2014 try again in a moment'); return; } var blob=f.binary?dataURLtoBlob(f.content):new Blob([f.content],{type:'text/html'}); var url=URL.createObjectURL(blob); window.open(url,'_blank'); setTimeout(function(){URL.revokeObjectURL(url);},6000); }
  function copyActive(){
    var f=activeFile(); if(!f) return;
    if(f._pending || f._error){ showToast('File is still loading \u2014 try again in a moment'); return; }
    var done=function(){ copied=true; renderEditorHeader(); clearTimeout(copyTimer); copyTimer=setTimeout(function(){copied=false; renderEditorHeader();},1200); };
    var fb=function(){ try{ var ta=document.createElement('textarea'); ta.value=f.content; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); ta.remove(); done(); }catch(e){} };
    try{ if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(f.content).then(done).catch(fb); else fb(); }catch(e){ fb(); }

  var crcTable=null;
  function crc32(bytes){
    if(!crcTable){ crcTable=new Uint32Array(256); for(var n=0;n<256;n++){ var c=n; for(var k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); crcTable[n]=c>>>0; } }
    var crc=0xFFFFFFFF;
    for(var i=0;i<bytes.length;i++) crc=(crc>>>8)^crcTable[(crc^bytes[i])&0xFF];
    return (crc^0xFFFFFFFF)>>>0;
  }
  function zipPath(f){
    var parts=[f.name], fid=f.folderId, seen={};
    while(fid){ var fo=folderById(fid); if(!fo||seen[fid]) break; seen[fid]=1; parts.unshift(fo.name); fid=fo.parentId||null; }
    return parts.join('/');
  }
  function zipName(){
    var d=new Date(), p=function(n){return String(n).padStart(2,'0');};
    var ts=''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
    var slug=(S.title||'sandbox').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'sandbox';
    return ts+'_'+slug+'.zip';
  }
  function dataURLtoBytes(d){ try{ var i=String(d).indexOf(','); var bin=atob(d.slice(i+1)); var arr=new Uint8Array(bin.length); for(var j=0;j<bin.length;j++) arr[j]=bin.charCodeAt(j); return arr; }catch(e){ return new Uint8Array(0); } }
  function makeZip(){
    var enc=new TextEncoder();
    var entries=S.files.map(function(f){ return {nameB:enc.encode(zipPath(f)), data:(f.binary?dataURLtoBytes(f.content):enc.encode(f.content))}; });
    var now=new Date();
    var dosTime=((now.getHours()&0x1f)<<11)|((now.getMinutes()&0x3f)<<5)|((now.getSeconds()/2)&0x1f);
    var dosDate=(((now.getFullYear()-1980)&0x7f)<<9)|(((now.getMonth()+1)&0xf)<<5)|(now.getDate()&0x1f);
    var chunks=[], central=[], offset=0;
    entries.forEach(function(e){
      var crc=crc32(e.data), size=e.data.length;
      var lh=new Uint8Array(30+e.nameB.length), dv=new DataView(lh.buffer);
      dv.setUint32(0,0x04034b50,true); dv.setUint16(4,20,true); dv.setUint16(6,0,true); dv.setUint16(8,0,true);
      dv.setUint16(10,dosTime,true); dv.setUint16(12,dosDate,true);
      dv.setUint32(14,crc,true); dv.setUint32(18,size,true); dv.setUint32(22,size,true);
      dv.setUint16(26,e.nameB.length,true); dv.setUint16(28,0,true);
      lh.set(e.nameB,30); chunks.push(lh, e.data);
      var local=offset; offset+=lh.length+size;
      var ce=new Uint8Array(46+e.nameB.length), cv=new DataView(ce.buffer);
      cv.setUint32(0,0x02014b50,true); cv.setUint16(4,20,true); cv.setUint16(6,20,true);
      cv.setUint16(8,0,true); cv.setUint16(10,0,true); cv.setUint16(12,dosTime,true); cv.setUint16(14,dosDate,true);
      cv.setUint32(16,crc,true); cv.setUint32(20,size,true); cv.setUint32(24,size,true);
      cv.setUint16(28,e.nameB.length,true); cv.setUint32(42,local,true);

  function exportZip(){
    if(!S.files.length) return;

  }

  function guides(depth){ var s=''; for(var i=0;i<depth;i++) s+='<span class="guide"><span></span></span>'; return s; }

  function buildRows(){
    var rows=[], searching=!!S.search;
    function walk(parentId, depth){
      var subs=S.folders.filter(function(f){return (f.parentId||null)===parentId;}).sort(byName);
      subs.forEach(function(fo){
        if(searching && !folderMatches(fo)) return;
        var open=searching ? true : !fo.collapsed;
        rows.push({kind:'folder', fo:fo, depth:depth, open:open});

      var files=S.files.filter(function(f){return (f.folderId||null)===parentId && matches(f);}).sort(byName);

    host.innerHTML='<div class="console">'
      + '<div class="console-head">'
      + '<span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Console</span>'
      + '<span class="badge'+(logs.length?'':' empty')+'">'+logs.length+'</span>'
      + '<div style="flex:1"></div>'
      + '<button class="smallbtn" id="clear-console">Clear</button>'
      + '<button class="iconbtn" style="width:26px;height:24px" id="close-console"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"></path></svg></button>'
      + '</div><div class="console-body">'+rows+'</div></div>';
    host.querySelector('#clear-console').addEventListener('click', function(){ logs=[]; renderConsole(); });
    host.querySelector('#close-console').addEventListener('click', function(){ S.consoleOpen=false; save(); renderConsole(); syncConsoleBtn(); });
  }
  function syncConsoleBtn(){ document.getElementById('console-btn').classList.toggle('on', !!S.consoleOpen); }

  /* ---------- theme / layout ---------- */
  function applyTheme(){
    document.body.classList.toggle('light', S.theme==='light');
    document.getElementById('theme-btn').innerHTML = S.theme==='dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"></path></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>';
    if(cm) cm.setOption('theme', S.theme==='dark'?'material-darker':'default');
  }
  function applyLayout(){
    document.getElementById('sidebar').style.display = S.sidebarHidden ? 'none' : 'flex';
    document.getElementById('sb-resizer').style.display = S.sidebarHidden ? 'none' : 'block';
    document.getElementById('sidebar').style.width = S.sidebarW+'px';
    var ec=document.getElementById('editor-col'), sr=document.getElementById('split-resizer'), pc=document.getElementById('preview-col');
    var f=activeFile(), po=previewOnly(f);
    if(po){ ec.style.display='none'; sr.style.display='none'; pc.style.flex='1 1 0'; }
    else { ec.style.display='flex'; sr.style.display=''; ec.style.flex = S.editorPct+' 1 0'; pc.style.flex = (1-S.editorPct)+' 1 0'; }
    refreshPreviewLabel();
  }

  function refreshPreviewLabel(){
    var pl=document.getElementById('preview-label'); if(!pl) return;
    var f=activeFile(), po=previewOnly(f);
    if(po && f){ if(f.binary){ pl.textContent=binaryLabel(f); if(/^image\//.test(f.mime||'')) ensureImgDims(f); } else pl.textContent=binaryLabel(f); }
    else if(f){ var s=humanSize(fileBytes(f)); pl.textContent = s ? ('Preview \u00b7 '+s) : 'Preview'; }
    else pl.textContent='Preview';
  }

  function renderAll(){ renderTitle(); renderTree(); renderEditorHeader(); renderFooter(); renderConsole(); syncConsoleBtn(); syncEditorReadonly(); applyLayout(); }

  /* ---------- popover menu ---------- */
  function openMenu(btn, id, isFolder){
    if(menu && menu.id===id){ closeMenu(); return; }
    var r=btn.getBoundingClientRect();
    menu={id:id, isFolder:isFolder, top:r.bottom+4, right:Math.max(8, window.innerWidth-r.right)};
    renderMenu(); renderTree();
  }
  function closeMenu(){ if(!menu) return; menu=null; document.getElementById('popover-host').innerHTML=''; renderTree(); }
  function renderMenu(){
    var host=document.getElementById('popover-host');
    if(!menu){ host.innerHTML=''; return; }
    var items;
    if(menu.isFolder){
      var foM=folderById(menu.id);
      items=[['New snippet','newfile'],['New subfolder','newsub'],['Rename','rename'],[(foM&&foM.readonly)?'Unlock folder':'Lock folder (read-only)','lock'],['Delete folder','delete|sep|danger']];
    } else {
      var isTpl=(S.templates && S.templates[fileType((fileById(menu.id)||{}).name)]===menu.id);
      var fM=null; for(var fmi=0;fmi<S.files.length;fmi++) if(S.files[fmi].id===menu.id){fM=S.files[fmi];break;}
      var tLab=fM?typeLabel(fileType(fM.name)):'';
      var tplItem = (fM && fM.binary) ? null : [isTpl?('Unmark '+tLab+' template'):('Mark as '+tLab+' template'),'tpl'];
      items=[['Rename','rename'],['Duplicate','dup'],['Download','download']];
      if(tplItem) items.push(tplItem);
      items.push([(fM&&fM.readonly)?'Unlock':'Lock (read-only)','lock'],['Delete','delete|sep|danger']);
    }
    var html='<div class="backdrop" data-closemenu="1"></div><div class="popover" style="top:'+menu.top+'px;right:'+menu.right+'px">';
    items.forEach(function(it){
      var parts=it[1].split('|'), act=parts[0], cls='item'+(parts.indexOf('sep')>=0?' sep':'')+(parts.indexOf('danger')>=0?' danger':'');
      html+='<div class="'+cls+'" data-menuact="'+act+'">'+it[0]+'</div>';
    });
    html+='</div>';
    host.innerHTML=html;
  }
  function runMenu(act){
    var id=menu.id, isFolder=menu.isFolder; closeMenu();
    if(isFolder){
      if(act==='newfile') newFileIn(id);
      else if(act==='newsub') newSubfolder(id);
      else if(act==='rename'){ renamingFolderId=id; renamingId=null; renderTree(); }
      else if(act==='lock') toggleReadonly(id, true);
      else if(act==='delete') deleteFolder(id);
    } else {
      if(act==='rename'){ renamingId=id; renamingFolderId=null; renderTree(); }
      else if(act==='dup') duplicate(id);
      else if(act==='download') downloadFile(id);
      else if(act==='tpl') setTemplate(id);
      else if(act==='lock') toggleReadonly(id, false);
      else if(act==='delete') deleteFile(id);
    }
  }

  /* ---------- event wiring ---------- */
  document.getElementById('theme-btn').addEventListener('click', function(){ S.theme=S.theme==='dark'?'light':'dark'; try{ localStorage.setItem(THEME_LS, S.theme); }catch(e){} if(!NOTE) save(); applyTheme(); var af=activeFile();
    if(af && isJson(af.name)){ if(jsonFrameReady){ try{ document.getElementById('json-frame').contentWindow.postMessage({__jf:1,type:'theme',dark:S.theme==='dark'},'*'); }catch(e){} } }
    else if(af && (isMarkdown(af.name)||isMdx(af.name)||isDrawio(af.name)||isExcalidraw(af.name)||af.binary)) updatePreview();
  });
  document.getElementById('zip-btn').addEventListener('click', exportZip);
  document.getElementById('newfile-btn').addEventListener('click', function(){ newFileIn(currentFolderId()); });
  document.getElementById('newfolder-btn').addEventListener('click', function(){ newSubfolder(currentFolderId()); });
  document.getElementById('nf-grid').addEventListener('click', function(e){ var t=e.target.closest('[data-tpl]'); if(t) nfSelectType(t.getAttribute('data-tpl')); });
  document.getElementById('nf-cancel').addEventListener('click', closeNewFileModal);
  document.getElementById('nf-create').addEventListener('click', submitNewFile);
  document.getElementById('newfile-modal').addEventListener('mousedown', function(e){ if(e.target===this) closeNewFileModal(); });
  document.getElementById('nf-name').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); submitNewFile(); } else if(e.key==='Escape'){ closeNewFileModal(); } });
  document.getElementById('nf-name').addEventListener('input', function(){ document.getElementById('nf-err').textContent=''; });
  document.getElementById('search').addEventListener('input', function(e){ S.search=e.target.value; document.getElementById('search-clear').hidden=!e.target.value; renderTree(); });
  document.getElementById('search-clear').addEventListener('click', function(){ var s=document.getElementById('search'); s.value=''; S.search=''; this.hidden=true; s.focus(); renderTree(); });
  document.getElementById('copy-btn').addEventListener('click', copyActive);
  document.getElementById('export-btn').addEventListener('click', exportActive);
  document.getElementById('refresh-btn').addEventListener('click', updatePreview);
  document.getElementById('newtab-btn').addEventListener('click', openNewTab);
  document.getElementById('console-btn').addEventListener('click', function(){ S.consoleOpen=!S.consoleOpen; save(); renderConsole(); syncConsoleBtn(); });
  document.getElementById('toggle-sb').addEventListener('click', function(){ S.sidebarHidden=!S.sidebarHidden; save(); applyLayout(); setTimeout(function(){ cm&&cm.refresh(); },60); });

  // popover delegation
  document.getElementById('popover-host').addEventListener('click', function(e){
    if(e.target.closest('[data-closemenu]')){ closeMenu(); return; }
    var mi=e.target.closest('[data-menuact]'); if(mi){ runMenu(mi.getAttribute('data-menuact')); }
  });

  // tree delegation
  var tree=document.getElementById('tree');
  var lastRowClick={id:null,t:0};
  tree.addEventListener('click', function(e){
    var kebab=e.target.closest('[data-kebab]');
    if(kebab){ e.stopPropagation(); openMenu(kebab, kebab.getAttribute('data-id'), kebab.getAttribute('data-kebab')==='folder'); return; }
    if(e.target.closest('[data-emptytrash]')){ e.stopPropagation(); emptyTrash(); return; }
    if(e.target.closest('[data-trashtoggle]')){ S._trashCollapsed=!S._trashCollapsed; renderTree(); return; }
    var rb=e.target.closest('[data-restore]'); if(rb){ e.stopPropagation(); restoreTrash(rb.getAttribute('data-restore')); return; }
    var pb=e.target.closest('[data-purge]'); if(pb){ e.stopPropagation(); purgeFile(pb.getAttribute('data-purge')); return; }
    var caret=e.target.closest('[data-caret]'); if(caret){ e.stopPropagation(); toggleFolder(caret.getAttribute('data-caret')); return; }
    if(e.target.closest('input[data-rninput]')) return;
    var row=e.target.closest('[data-row]'); if(!row) return;
    var id=row.getAttribute('data-id');
    var kind=row.getAttribute('data-row');
    var onName=!!e.target.closest('[data-rnname]');
    var now=Date.now();
    if(onName && lastRowClick.id===id && (now-lastRowClick.t)<420){
      lastRowClick={id:null,t:0};
      if(kind==='folder'){ renamingFolderId=id; renamingId=null; }
      else { renamingId=id; renamingFolderId=null; }
      renderTree();
      return;
    }
    lastRowClick={id:id,t:now};
    if(kind==='folder') toggleFolder(id);
    else selectFile(id);
  });
  tree.addEventListener('dblclick', function(e){
    var nm=e.target.closest('[data-rnname]'); if(!nm) return;
    e.stopPropagation();
    var id=nm.getAttribute('data-id');
    if(nm.getAttribute('data-rnname')==='folder'){ renamingFolderId=id; renamingId=null; }
    else { renamingId=id; renamingFolderId=null; }
    renderTree();
  });
  // rename input commit (delegated blur/keydown)
  tree.addEventListener('keydown', function(e){
    var inp=e.target.closest('input[data-rninput]'); if(!inp) return;
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ renamingId=null; renamingFolderId=null; renderTree(); }
  });
  tree.addEventListener('blur', function(e){
    var inp=e.target.closest('input[data-rninput]'); if(!inp) return;
    var id=inp.getAttribute('data-id');
    if(inp.getAttribute('data-rninput')==='folder') commitRenameFolder(id, inp.value);
    else commitRename(id, inp.value);
  }, true);
  // prevent rename input click from toggling/selecting
  tree.addEventListener('mousedown', function(e){ if(e.target.closest('input[data-rninput]')) e.stopPropagation(); });

  // drag & drop
  tree.addEventListener('dragstart', function(e){
    var row=e.target.closest('[data-row]'); if(!row) return;
    var id=row.getAttribute('data-id');
    if(row.getAttribute('data-row')==='folder'){ dragFolderId=id; dragId=null; }
    else { dragId=id; dragFolderId=null; }
    e.dataTransfer.effectAllowed='move';
    try{ e.dataTransfer.setData('text/plain', id); }catch(_){}
  });
  tree.addEventListener('dragover', function(e){ e.preventDefault(); });
  tree.addEventListener('drop', function(e){
    e.preventDefault();
    if(isFileDrag(e)){ e.stopPropagation(); hideDropzone(); var fr=e.target.closest('[data-row="folder"]'); handleExternalDrop(e, fr?fr.getAttribute('data-id'):null); return; }
    var row=e.target.closest('[data-row]');
    if(row){
      e.stopPropagation();
      var id=row.getAttribute('data-id');
      if(row.getAttribute('data-row')==='folder') dropOnFolder(id);
      else dropOnFile(id);
    } else {
      dropOnRoot();
    }
  });

  // sidebar resizer
  document.getElementById('sb-resizer').addEventListener('mousedown', function(e){
    e.preventDefault(); document.body.style.userSelect='none';
    var ifr=document.getElementById('preview'); ifr.style.pointerEvents='none';
    function mm(ev){ S.sidebarW=Math.max(180, Math.min(480, ev.clientX)); document.getElementById('sidebar').style.width=S.sidebarW+'px'; }
    function mu(){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); document.body.style.userSelect=''; ifr.style.pointerEvents=''; save(); cm&&cm.refresh(); }
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
  // split resizer
  document.getElementById('split-resizer').addEventListener('mousedown', function(e){
    e.preventDefault(); document.body.style.userSelect='none';
    var split=document.getElementById('split'), ec=document.getElementById('editor-col'), pc=document.getElementById('preview-col');
    var ifr=document.getElementById('preview'); ifr.style.pointerEvents='none';
    function mm(ev){ var r=split.getBoundingClientRect(); var p=(ev.clientX-r.left)/r.width; S.editorPct=Math.max(0.18, Math.min(0.85,p)); ec.style.flex=S.editorPct+' 1 0'; pc.style.flex=(1-S.editorPct)+' 1 0'; }
    function mu(){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); document.body.style.userSelect=''; ifr.style.pointerEvents=''; save(); cm&&cm.refresh(); }
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });

  window.addEventListener('resize', function(){ if(menu) closeMenu(); });

  /* ---------- external drop overlay wiring ---------- */
  var dzCounter=0, dropHi=null;
  function setDropTarget(el){ if(dropHi===el) return; if(dropHi) dropHi.classList.remove('drop-target'); dropHi=el; if(dropHi) dropHi.classList.add('drop-target'); }
  function showDropzone(){ var d=document.getElementById('dropzone'); if(d) d.classList.add('show'); }
  function hideDropzone(){ dzCounter=0; setDropTarget(null); var d=document.getElementById('dropzone'); if(d) d.classList.remove('show'); }
  window.addEventListener('dragenter', function(e){ if(!isFileDrag(e)) return; e.preventDefault(); dzCounter++; showDropzone(); });
  window.addEventListener('dragover', function(e){ if(!isFileDrag(e)) return; e.preventDefault(); try{ e.dataTransfer.dropEffect='copy'; }catch(_){} var fr=e.target&&e.target.closest?e.target.closest('[data-row="folder"]'):null; setDropTarget(fr); });
  window.addEventListener('dragleave', function(e){ if(!isFileDrag(e)) return; dzCounter--; if(dzCounter<=0) hideDropzone(); });
  window.addEventListener('drop', function(e){
    if(!isFileDrag(e)) return;
    e.preventDefault();
    var fr=e.target&&e.target.closest?e.target.closest('[data-row="folder"]'):null;
    var dest=fr?fr.getAttribute('data-id'):null;
    hideDropzone();
    handleExternalDrop(e, dest);
  });

  /* ---------- boot ---------- */
  function boot(){
  applyTheme();
  renderAll();
  if(window.CodeMirror){ initEditor(); }
  else {
    // fallback textarea
    var host=document.getElementById('cm-host');
    host.innerHTML='<textarea id="fallback" spellcheck="false" style="position:absolute;inset:0;width:100%;height:100%;resize:none;border:0;outline:none;padding:12px 14px;background:var(--panel);color:var(--fg);font-family:\'JetBrains Mono\',monospace;font-size:13px;line-height:1.65;font-variant-ligatures:none;font-feature-settings:\'liga\' 0,\'calt\' 0"></textarea>';
    var ta=host.querySelector('#fallback'); var af=activeFile(); ta.value=(af&&af.content!=null)?af.content:''; ta.readOnly=isFileReadonly(af);
    ta.addEventListener('input', function(){ var f=activeFile(); if(!f) return; if(isFileReadonly(f)||f._pending||f._error){ ta.value=f.content!=null?f.content:''; return; } f.content=ta.value; save(); clearTimeout(previewTimer); previewTimer=setTimeout(updatePreview,450); });
    ta.addEventListener('paste', function(e){ onDocPaste(e); });
    updatePreview();
  }
  }
  if(NOTE){
    noteBoot();
  } else {
    initState(load());
    boot();
  }
})();
</script>
</body>
</html>
