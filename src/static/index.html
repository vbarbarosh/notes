<script>
const uploads_list = Vue.reactive([]);
let uploads_uid_seq = 0;

async function do_upload_file(note_uid, file)
{
    const uid = ++uploads_uid_seq;
    const name = file.name || String(file.fullPath || '').split('/').filter(Boolean).pop() || 'file';
    uploads_list.push({uid, name, progress: 0});
    try {
        await api_notes_upload_file({
            note_uid,
            file,
            onProgress: function (event) {
                const item = uploads_list.find(u => u.uid === uid);
                if (item && event.total) {
                    item.progress = Math.round(event.loaded / event.total * 100);
                }
            },
        });
    }
    finally {
        const i = uploads_list.findIndex(u => u.uid === uid);
        if (i !== -1) {
            uploads_list.splice(i, 1);
        }
    }
}

const TAG_FILTER_STORAGE_KEY = 'notes.selected_tags';
const TAG_EXCLUDE_STORAGE_KEY = 'notes.excluded_tags';
const TAG_PATTERN = /#[A-Za-z0-9][A-Za-z0-9_-]*/g;
const URL_PATTERN = /https?:\/\/[^\s<>"'`]+/g;

function parse_note_tags(body)
{
    const value = String(body || '');
    const lines = value.split(/\r?\n/);
    const first_line = lines[0] || '';
    const matches = first_line.match(TAG_PATTERN) || [];
    if (!matches.length) {
        return {tags: [], display_body: value};
    }

    const non_tag_text = first_line.replace(TAG_PATTERN, '').trim();
    if (/[A-Za-z0-9]/.test(non_tag_text)) {
        return {tags: [], display_body: value};
    }

    const tags = Array.from(new Set(matches.map(tag => tag.toLowerCase())));
    return {tags, display_body: lines.slice(1).join('\n').trimStart()};
}

function load_selected_tags()
{
    return load_tag_list(TAG_FILTER_STORAGE_KEY);
}

function load_excluded_tags()
{
    return load_tag_list(TAG_EXCLUDE_STORAGE_KEY);
}

function load_tag_list(key)
{
    try {
        const tags = JSON.parse(localStorage.getItem(key) || '[]');
        return Array.isArray(tags) ? tags.filter(tag => typeof tag === 'string') : [];
    }
    catch (error) {
        return [];
    }
}

function extract_youtube_items(body)
{
    const urls = String(body || '').match(URL_PATTERN) || [];
    const seen = new Set();
    const out = [];

    urls.forEach(function (raw_url) {
        const url = raw_url.replace(/[)\].,!?;:]+$/g, '');
        const id = parse_youtube_id(url);
        if (!id || seen.has(id)) {
            return;
        }
        seen.add(id);
        out.push({
            id,
            url,
            label: `YouTube ${out.length + 1}`,
            embed_url: `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`,
        });
    });

    return out;
}

function parse_youtube_id(url)
{
    try {
        const parsed = new URL(url);
        const host = parsed.hostname.replace(/^www\./, '');

        if (host === 'youtu.be') {
            return clean_youtube_id(parsed.pathname.split('/').filter(Boolean)[0]);
        }

        const is_youtube = host === 'youtube.com' || host.endsWith('.youtube.com');
        const is_youtube_nocookie = host === 'youtube-nocookie.com' || host.endsWith('.youtube-nocookie.com');
        if (!is_youtube && !is_youtube_nocookie) {
            return null;
        }

        if (parsed.pathname === '/watch') {
            return clean_youtube_id(parsed.searchParams.get('v'));
        }

        const parts = parsed.pathname.split('/').filter(Boolean);
        if (['embed', 'shorts', 'live'].includes(parts[0])) {
            return clean_youtube_id(parts[1]);
        }
    }
    catch (error) {
    }

    return null;
}

function clean_youtube_id(value)
{
    const id = String(value || '').trim();
    return /^[A-Za-z0-9_-]{6,}$/.test(id) ? id : null;
}

const app = Vue.createApp({

            </div>

<!--

                <textarea v-autosize v-model="new_body" v-on:paste="paste" rows="10" placeholder="Write your note here..."></textarea>

                <button v-on:click="click_submit" class="submit-btn">Submit</button>

-->

            <div v-for="note in filtered_notes"

                                v-bind:class="{highlight: (mouseover_note_uid === note.uid && mouseover_file_path === file.path)}"

                        </a>

                <table v-if="note.files.length"  class="notes-table">
                <thead>

                    <th>path</th>

                    <th></th>

                </thead>

                        v-on:mouseleave="mouseleave_note_table_row($event, note, file)"

        </div>

        <div v-if="uploads.length" class="upload-progress-panel">
            <div class="upload-progress-title">Uploading {{ uploads.length }} file{{ uploads.length !== 1 ? 's' : '' }}</div>

        <div v-if="youtube_player" class="youtube-player">

            </div>
            <iframe
                v-bind:src="youtube_player.embed_url"
                title="YouTube player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen></iframe>
        </div>
    `,
    data: function () {
        return {
            note_refs: {},
            new_body: '',
            active_note: null,
            editing_note: null,
            dropping_note_uid: null,
            mouseover_note_uid: null,
            mouseover_file_path: null,
            notes: [],
            selected_tags: load_selected_tags(),
            excluded_tags: load_excluded_tags(),
            tag_picker_open: false,
            tag_query: '',
            tag_sort: 'count',
            note_query: '',
            youtube_player: null,
            jobs: [],
            jobs_loaded: false,
            jobs_poll_timer: null,
            seen_terminal_job_uids: [],
            uploads: uploads_list,
        };
    },
    computed: {
        decorated_notes: function () {
            return this.notes.map(function (note) {
                const parsed = parse_note_tags(note.body);
                const youtube_items = extract_youtube_items(note.body);
                const system_tags = [];
                if (youtube_items.length) {
                    system_tags.push('#youtube');
                }
                return {
                    ...note,
                    display_tags: Array.from(new Set([...parsed.tags, ...system_tags])),
                    display_body: parsed.display_body,
                    youtube_items,
                };
            });
        },
        all_tags: function () {
            const counts = new Map();
            this.decorated_notes.forEach(function (note) {
                note.display_tags.forEach(function (tag) {
                    counts.set(tag, (counts.get(tag) || 0) + 1);
                });
            });
            return Array.from(counts.entries())
                .map(([name, count]) => ({name, count}))
                .sort((a, b) => a.name.localeCompare(b.name));
        },
        visible_tags: function () {
            const query = this.tag_query.trim().toLowerCase();
            return this.all_tags
                .filter(tag => !query || tag.name.toLowerCase().includes(query))
                .sort((a, b) => {
                    if (this.tag_sort === 'count') {
                        return (b.count - a.count) || a.name.localeCompare(b.name);
                    }
                    return a.name.localeCompare(b.name);
                });
        },
        filtered_notes: function () {
            const query = this.note_query.trim().toLowerCase();
            return this.decorated_notes.filter(note => {
                if (!this.selected_tags.every(tag => note.display_tags.includes(tag))) {
                    return false;
                }
                if (!this.excluded_tags.every(tag => !note.display_tags.includes(tag))) {
                    return false;
                }
                if (!query) {
                    return true;
                }
                return [
                    note.uid,
                    note.name,
                    note.body,
                    note.display_tags.join(' '),
                ].join(' ').toLowerCase().includes(query);
            });
        },
        has_tag_filter: function () {
            return !!(this.selected_tags.length || this.excluded_tags.length);
        },
        has_any_filter: function () {
            return !!(this.has_tag_filter || this.note_query.trim());
        },
        filter_label: function () {
            return [
                ...this.selected_tags,
                ...this.excluded_tags.map(tag => `without ${tag}`),
                ...(this.note_query.trim() ? [`matching "${this.note_query.trim()}"`] : []),
            ].join(' ');
        },
    },
    watch: {
        selected_tags: {
            deep: true,
            handler: function () {
                localStorage.setItem(TAG_FILTER_STORAGE_KEY, JSON.stringify(this.selected_tags));
            },
        },
        excluded_tags: {
            deep: true,
            handler: function () {
                localStorage.setItem(TAG_EXCLUDE_STORAGE_KEY, JSON.stringify(this.excluded_tags));
            },
        },
    },
    methods: {
        refresh: async function () {
            this.notes = await api_notes_list().then(v => v.items);
            this.prune_selected_tags();
        },
        refresh_jobs: async function () {
            const data = await api_jobs_list();
            const items = data.items || [];
            const has_new_terminal_job = this.jobs_loaded && items.some(job => {
                if (!['finished', 'failed'].includes(job.bucket)) {
                    return false;
                }
                return !this.seen_terminal_job_uids.includes(job.uid);
            });

            this.jobs = items;
            this.jobs_loaded = true;
            this.seen_terminal_job_uids = Array.from(new Set([
                ...this.seen_terminal_job_uids,
                ...items.filter(job => ['finished', 'failed', 'confirmed'].includes(job.bucket)).map(job => job.uid),
            ]));

            if (has_new_terminal_job) {
                await this.refresh();
            }
        },
        reset: function () {
            this.new_body = '';
            this.editing_note = null;
        },
        note_jobs: function (note) {
            return this.jobs.filter(job => job.note_uid === note.uid || String(job.note_uid || '').startsWith(note.uid + '-'));
        },
        note_active_job: function (note, job_name) {
            return this.note_jobs(note).find(job => job.job_name === job_name && job.bucket === 'active');
        },
        job_label: function (job) {
            return [
                job.job_name,
                job.user_friendly_status || job.status,
                job.bucket,
            ].filter(Boolean).join(' · ');
        },
        select_notes_overview: function (note_uid) {
            this.note_refs[note_uid]?.scrollIntoView({behavior: 'smooth', block: 'center'});
            this.active_note = this.notes.find(v => v.uid === note_uid);
        },
        toggle_tag_picker: async function () {
            this.tag_picker_open = !this.tag_picker_open;
            if (this.tag_picker_open) {
                await this.$nextTick();
                this.$refs.tag_search?.focus();
                this.$refs.tag_search?.select();
            }
        },
        close_tag_picker_on_outside_click: function (event) {
            if (!this.tag_picker_open) {
                return;
            }
            if (this.$refs.tag_picker_wrap?.contains(event.target)) {
                return;
            }
            this.tag_picker_open = false;
        },
        select_first_visible_tag: function () {
            const tag = this.visible_tags[0];
            if (tag) {
                this.toggle_include_tag(tag.name);
            }
        },
        toggle_include_tag: function (tag) {
            if (this.selected_tags.includes(tag)) {
                this.selected_tags = this.selected_tags.filter(value => value !== tag);
                return;
            }
            this.selected_tags = [...this.selected_tags, tag].sort((a, b) => a.localeCompare(b));
            this.excluded_tags = this.excluded_tags.filter(value => value !== tag);
        },
        toggle_exclude_tag: function (tag) {
            if (this.excluded_tags.includes(tag)) {
                this.excluded_tags = this.excluded_tags.filter(value => value !== tag);
                return;
            }
            this.excluded_tags = [...this.excluded_tags, tag].sort((a, b) => a.localeCompare(b));
            this.selected_tags = this.selected_tags.filter(value => value !== tag);
        },
        clear_filters: function () {
            this.selected_tags = [];
            this.excluded_tags = [];
            this.note_query = '';
        },
        toggle_tag_sort: function () {
            this.tag_sort = this.tag_sort === 'count' ? 'name' : 'count';
        },
        prune_selected_tags: function () {
            const found = new Set(this.all_tags.map(tag => tag.name));
            const selected_tags = this.selected_tags.filter(tag => found.has(tag));
            const excluded_tags = this.excluded_tags.filter(tag => found.has(tag));
            if (selected_tags.length !== this.selected_tags.length) {
                this.selected_tags = selected_tags;
            }
            if (excluded_tags.length !== this.excluded_tags.length) {
                this.excluded_tags = excluded_tags;
            }
        },
        change_files: async function (event) {
            const tmp = await api_notes_create({body: this.new_body});
            const note_uid = tmp.uid;
            const files = await get_event_files(event);
            await Promise.all(files.map(file => do_upload_file(note_uid, file)));
            this.reset();
            await this.refresh();
        },
        paste: async function (event) {
            const items = event.clipboardData && event.clipboardData.items;
            if (!items) {
                return;
            }
            let note_uid;
            for (let i = 0; i < items.length; ++i) {
                const item = items[i];
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    if (file) {
                        if (!note_uid) {
                            const tmp = await api_notes_create({body: this.new_body});
                            note_uid = tmp.uid;
                        }
                        await do_upload_file(note_uid, file);
                    }
                }
            }
            await this.refresh();
        },
        paste_note: async function (event, note) {
            const items = event.clipboardData && event.clipboardData.items;
            if (!items) {
                return;
            }
            let note_uid = note.uid;
            for (let i = 0; i < items.length; ++i) {
                const item = items[i];
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    if (file) {
                        await do_upload_file(note_uid, file);
                    }
                }
            }
            await this.refresh();
        },
        click_submit: async function () {
            await api_notes_create({body: this.new_body});
            await this.reset();
            await this.refresh();
        },
        click_h2_copy: async function (event, note) {
            const elem = event.currentTarget;
            await navigator.clipboard.writeText(note.body);
            elem.classList.add('copied');
            await Promise.delay(900);
            elem.classList.remove('copied');
        },
        click_h2_paste: async function (note) {
            const note_uid = note.uid;
            const items = await navigator.clipboard.read();
            for (const item of items) {
                const blob = await item.getType('image/png');
                await do_upload_file(note_uid, new File([blob], 'image.png'));
            }
            await this.refresh();
        },
        click_h2_edit: async function (note) {
            this.editing_note = JSON.parse(JSON.stringify(note));
        },
        click_h2_remove: async function (note) {
            await api_notes_remove({note_uid: note.uid});
            await this.refresh();
        },
        click_editing_save: async function () {
            await api_notes_update({note_uid: this.editing_note.uid, body: this.editing_note.body});
            this.reset();
            await this.refresh();
        },
        click_editing_cancel: async function () {
            this.editing_note = null;
        },
        click_file_save: function (note, file) {
            window.open(file.url, '_blank');
        },
        click_file_remove: async function (note, file) {
            await api_notes_remove_file({note_uid: note.uid, filename: file.path});
            await this.refresh();
        },
        play_youtube: function (note, item) {
            this.youtube_player = {
                ...item,
                title: note.name || note.uid,
            };
        },
        open_youtube_source: function () {
            if (this.youtube_player?.url) {
                window.open(this.youtube_player.url, '_blank');
            }
        },
        click_youtube_thumbnails: async function (note) {
            await api_jobs_create({job_name: 'youtube-thumbnails', note_uid: note.uid});
            await this.refresh_jobs();
        },
        click_youtube_mp3: async function (note) {
            await api_jobs_create({job_name: 'youtube-mp3', note_uid: note.uid});
            await this.refresh_jobs();
        },
        click_job_confirm: async function (job) {
            await api_jobs_confirm({job_uid: job.uid});
            await this.refresh_jobs();
        },
        mouseover_note: function (event, note) {
            this.active_note = note;
        },
        mouseleave_note: function (event, note) {
            if (this.active_note?.uid === note.uid) {
                this.active_note = null;
            }
        },
        dragover_note: function (event, note) {
            event.preventDefault();
            this.dropping_note_uid = note.uid;
        },
        dragleave_note: function (event, note) {
            if (this.dropping_note_uid === note.uid) {
                this.dropping_note_uid = null;
            }
        },
        drop_note: async function (event, note) {
            event.preventDefault();
            this.dropping_note_uid = null;
            const files = await get_event_files(event);
            if (files.length) {
                await Promise.all(files.map(file => do_upload_file(note.uid, file)));
                await this.refresh();
            }
        },
        mouseover_note_image: function (event, note, file) {
            this.mouseover_note_uid = note.uid;
            this.mouseover_file_path = file.path;
        },
        mouseleave_note_image: function (event, note, file) {
            if (this.mouseover_note_uid === note.uid && this.mouseover_file_path === file.path) {
                this.mouseover_note_uid = null;
                this.mouseover_file_path = null;
            }
        },
        mouseover_note_table_row: function ($event, note, file) {
            this.mouseover_note_uid = note.uid;
            this.mouseover_file_path = file.path;
        },
        mouseleave_note_table_row: function ($event, note, file) {
            if (this.mouseover_note_uid === note.uid && this.mouseover_file_path === file.path) {
                this.mouseover_note_uid = null;
                this.mouseover_file_path = null;
            }
        },
    },
    created: async function () {
        await this.refresh();
        await this.refresh_jobs();
    },
    mounted: function () {
        document.addEventListener('click', this.close_tag_picker_on_outside_click);
        this.jobs_poll_timer = setInterval(this.refresh_jobs, 2500);
    },
    unmounted: function () {
        document.removeEventListener('click', this.close_tag_picker_on_outside_click);
        clearInterval(this.jobs_poll_timer);
    },
});
app.mixin({
    methods: {
        px,
        pc,
        format_bytes,
    },
});
</script>

    app.mount('#app');
