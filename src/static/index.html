<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://unpkg.com/@vbarbarosh/smcss@1.2.0/dist/reset.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.43.0/dist/tabler-icons.min.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
    <link href="https://unpkg.com/@xterm/xterm@5.5.0/css/xterm.css" rel="stylesheet">
    <link id="smcss" href="https://unpkg.com/@vbarbarosh/smcss@1.2.0/dist/sm.css" rel="stylesheet">
    <title>notes</title>
    <style>
        .bucket { font-size: 50px; line-height: 1em; }
    </style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/axios@1.10.0/dist/axios.min.js"></script>
<script src="https://unpkg.com/@vbarbarosh/dd@1.9.0/dist/dd.js"></script>
<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.js"></script>
<script src="https://unpkg.com/bluebird@3.7.2/js/browser/bluebird.js"></script>
<script>Promise.config({warnings: {wForgottenReturn: false}});</script>
<script src="https://unpkg.com/vue@3.5.12/dist/vue.global.js"></script>
<script src="https://unpkg.com/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://unpkg.com/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="js/utils.js"></script>
<script src="js/apis.js"></script>
<script>
const app = Vue.createApp({
    template: `
<!--        <div class="fix-br m15 bucket">🗑️</div>-->

        <notes-overview v-on:select="select_notes_overview"
                        v-bind:notes="filtered_notes"
                        v-bind:active-uid="active_note?.uid" />

        <div class="ma max-w600">

            <notes-new
                v-on:refresh="refresh"
                v-on:create-start="note_create_start"
                v-on:create-done="note_create_done"
                v-on:create-fail="note_create_fail" />

            <div class="filters-bar">
                <div v-if="all_tags.length" ref="tag_picker_wrap" class="tag-picker-wrap">
                    <button
                        type="button"
                        v-on:click="toggle_tag_picker"
                        v-bind:class="['filter-button', {active: has_tag_filter}]"
                        title="Choose tag filters">
                        Tags <span>{{ all_tags.length }}</span>
                    </button>
                    <div v-if="tag_picker_open" class="tag-popover">
                        <div class="tag-popover-head">
                            <input
                                v-model="tag_query"
                                ref="tag_search"
                                type="search"
                                class="tag-search"
                                v-on:keydown.enter.prevent="select_first_visible_tag"
                                placeholder="Filter tags">
                            <button type="button" class="tag-sort" v-on:click="toggle_tag_sort">
                                {{ tag_sort === 'count' ? 'Count' : 'Name' }}
                            </button>
                        </div>
                        <div v-if="visible_tags.length" class="tag-list">
                            <div v-for="tag in visible_tags" v-bind:key="tag.name" class="tag-row">
                                <button
                                    type="button"
                                    v-on:click="toggle_include_tag(tag.name)"
                                    v-bind:class="['tag-name', {active: selected_tags.includes(tag.name), excluded: excluded_tags.includes(tag.name)}]"
                                    v-bind:title="'Require ' + tag.name">
                                    {{ tag.name }} <span>{{ tag.count }}</span>
                                </button>
                                <button
                                    type="button"
                                    v-on:click="toggle_include_tag(tag.name)"
                                    v-bind:class="['tag-state', 'include', {active: selected_tags.includes(tag.name)}]"
                                    v-bind:title="'Require ' + tag.name">
                                    +
                                </button>
                                <button
                                    type="button"
                                    v-on:click="toggle_exclude_tag(tag.name)"
                                    v-bind:class="['tag-state', 'exclude', {active: excluded_tags.includes(tag.name)}]"
                                    v-bind:title="'Hide ' + tag.name">
                                    -
                                </button>
                            </div>
                        </div>
                        <div v-else class="tag-empty">No tags match</div>
                    </div>
                </div>

                <input
                    v-model="note_query"
                    type="search"
                    class="note-search"
                    placeholder="Search notes and files">

                <button
                    v-if="has_any_filter"
                    type="button"
                    class="filter-clear"
                    v-on:click="clear_filters">
                    Clear
                </button>

                <div class="filter-count">{{ filtered_notes.length }} / {{ notes.length }}</div>
            </div>

            <div v-if="has_any_filter" class="active-filters">
                <button
                    v-for="tag in selected_tags"
                    v-bind:key="'include:' + tag"
                    type="button"
                    class="active-filter include"
                    v-on:click="toggle_include_tag(tag)"
                    v-bind:title="'Remove required tag ' + tag">
                    + {{ tag }}
                </button>
                <button
                    v-for="tag in excluded_tags"
                    v-bind:key="'exclude:' + tag"
                    type="button"
                    class="active-filter exclude"
                    v-on:click="toggle_exclude_tag(tag)"
                    v-bind:title="'Remove hidden tag ' + tag">
                    - {{ tag }}
                </button>
                <button
                    v-if="note_query.trim()"
                    type="button"
                    class="active-filter search"
                    v-on:click="note_query = ''"
                    title="Clear note search">
                    "{{ note_query.trim() }}"
                </button>
            </div>

            <div v-if="has_any_filter && !filtered_notes.length" class="notes-empty">
                No notes match {{ filter_label }}
            </div>

<!--
            <div class="note-input-card">
                <h1 class="note-title">📝 Notes</h1>
                <textarea v-autosize v-model="new_body" v-on:paste="paste" rows="10" placeholder="Write your note here..."></textarea>
                <div class="flex-row flex-align-center gap10 mb10">
                    <input v-on:change="change_files" type="file" id="file-input" multiple webkitdirectory>
                    <label for="file-input" class="file-label">Choose Files</label>
                </div>
                <button v-on:click="click_submit" class="submit-btn">Submit</button>
            </div>
-->

            <notes-list ref="list"
                        v-bind:notes="filtered_notes"
                        v-bind:jobs="jobs"
                        v-bind:active-uid="active_note?.uid"
                        v-bind:editing="editing_note"
                        v-bind:selected-tags="selected_tags"
                        v-bind:excluded-tags="excluded_tags"
                        v-bind:hovered-note-uid="mouseover_note_uid"
                        v-bind:hovered-file-path="mouseover_file_path"
                        v-bind:playing-youtube-id="youtube_player?.id"
                        v-on:activate="activate_note"
                        v-on:deactivate="deactivate_note"
                        v-on:toggle-tag="toggle_include_tag"
                        v-on:play-youtube="play_youtube"
                        v-on:open-terminal="open_terminal"
                        v-on:refresh-jobs="refresh_jobs"
                        v-on:edit="edit_note"
                        v-on:edit-save="save_note_edit"
                        v-on:edit-cancel="cancel_note_edit"
                        v-on:remove="remove_note"
                        v-on:remove-file="remove_note_file"
                        v-on:hover-file="hover_file"
                        v-on:uploaded="refresh_preserving_note_files" />
        </div>

        <uploads-panel />

        <mini-player
            v-on:select-note="select_notes_overview"
            v-on:heart="heart_track"
            v-on:hover-track="set_hover_track"
            v-bind:tracks="media_tracks"
            v-bind:hovered-note-uid="mouseover_note_uid"
            v-bind:hovered-file-path="mouseover_file_path" />

        <div v-if="youtube_player" class="youtube-player">
            <div class="youtube-player-head">
                <div class="youtube-player-title">{{ youtube_player.title }}</div>
                <button type="button" v-on:click="open_youtube_source" title="Open on YouTube">↗</button>
                <button type="button" v-on:click="youtube_player = null" title="Close">×</button>
            </div>
            <iframe
                v-bind:src="youtube_player.embed_url"
                title="YouTube player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen></iframe>
        </div>

        <terminal-panel
            v-if="terminal_job"
            v-on:close="close_terminal"
            v-bind:job="terminal_job" />
    `,
    data: function () {
        return {
            new_body: '',
            active_note: null,
            editing_note: null,
            mouseover_note_uid: null,
            mouseover_file_path: null,
            notes: [],
            selected_tags: load_selected_tags(),
            excluded_tags: load_excluded_tags(),
            tag_picker_open: false,
            tag_query: '',
            tag_sort: 'count',
            note_query: '',
            youtube_player: null,
            jobs: [],
            jobs_loaded: false,
            jobs_poll_timer: null,
            jobs_event_source: null,
            jobs_refresh_timer: null,
            seen_terminal_job_uids: [],
            terminal_job: null,
            pending_note_removals: [],
            pending_file_removals: [],
            notes_hearts: {},
        };
    },
    computed: {
        decorated_notes: function () {
            return this.notes.map(note => {
                const parsed = parse_note_tags(note.body);
                const youtube_items = extract_youtube_items(note.body);
                const system_tags = [];
                if (youtube_items.length) {
                    system_tags.push('#youtube');
                }
                if (this.note_has_hearts(note)) {
                    system_tags.push('#hearted');
                }
                return {
                    ...note,
                    display_tags: Array.from(new Set([...parsed.tags, ...system_tags])),
                    display_body: parsed.display_body,
                    youtube_items,
                };
            });
        },
        all_tags: function () {
            const counts = new Map();
            this.decorated_notes.forEach(function (note) {
                note.display_tags.forEach(function (tag) {
                    counts.set(tag, (counts.get(tag) || 0) + 1);
                });
            });
            return Array.from(counts.entries())
                .map(([name, count]) => ({name, count}))
                .sort((a, b) => a.name.localeCompare(b.name));
        },
        visible_tags: function () {
            const query = this.tag_query.trim().toLowerCase();
            return this.all_tags
                .filter(tag => !query || tag.name.toLowerCase().includes(query))
                .sort((a, b) => {
                    if (this.tag_sort === 'count') {
                        return (b.count - a.count) || a.name.localeCompare(b.name);
                    }
                    return a.name.localeCompare(b.name);
                });
        },
        filtered_notes: function () {
            const query = this.note_query.trim().toLowerCase();
            return this.decorated_notes.filter(note => {
                if (!this.selected_tags.every(tag => note.display_tags.includes(tag))) {
                    return false;
                }
                if (!this.excluded_tags.every(tag => !note.display_tags.includes(tag))) {
                    return false;
                }
                if (!query) {
                    return true;
                }
                return [
                    note.uid,
                    note.name,
                    note.body,
                    note.display_tags.join(' '),
                    (note.files || []).map(file => file.path).join(' '),
                ].join(' ').toLowerCase().includes(query);
            });
        },
        has_tag_filter: function () {
            return !!(this.selected_tags.length || this.excluded_tags.length);
        },
        has_any_filter: function () {
            return !!(this.has_tag_filter || this.note_query.trim());
        },
        media_tracks: function () {
            return this.notes.flatMap(note => {
                const note_cover = (note.files || []).find(file => file.thumbnail_url);
                const note_hearts = this.notes_hearts[note.uid]?.tracks || {};
                return (note.files || [])
                    .filter(file => is_audio_file(file) || is_video_file(file))
                    .map(file => {
                        const is_video = is_video_file(file);
                        const hearts = note_hearts[file.path]?.hearts || [];
                        return {
                            key: `${note.uid}:${file.path}`,
                            title: file.path.split('/').pop(),
                            note_label: note.name || note.uid,
                            url: file.url,
                            kind: is_video ? 'video' : 'audio',
                            cover_url: is_video
                                ? (file.thumbnail_url || null)
                                : (note_cover?.thumbnail_url || note_cover?.url || null),
                            meta: file.details
                                ? (is_video ? video_file_summary(file) : audio_file_summary(file))
                                : null,
                            note_uid: note.uid,
                            file_path: file.path,
                            sha256: file.sha256 || null,
                            heart_count: hearts.length,
                        };
                    });
            });
        },
        filter_label: function () {
            return [
                ...this.selected_tags,
                ...this.excluded_tags.map(tag => `without ${tag}`),
                ...(this.note_query.trim() ? [`matching "${this.note_query.trim()}"`] : []),
            ].join(' ');
        },
    },
    watch: {
        selected_tags: {
            deep: true,
            handler: function () {
                localStorage.setItem(TAG_FILTER_STORAGE_KEY, JSON.stringify(this.selected_tags));
            },
        },
        excluded_tags: {
            deep: true,
            handler: function () {
                localStorage.setItem(TAG_EXCLUDE_STORAGE_KEY, JSON.stringify(this.excluded_tags));
            },
        },
    },
    methods: {
        hearts_path_for_note: function () {
            return 'apps/mini-player/hearts.json';
        },
        hearts_url_for_note: function (note_uid) {
            const path = this.hearts_path_for_note().split('/').map(encodeURIComponent).join('/');
            return `/r/${encodeURIComponent(note_uid)}/files/${path}`;
        },
        fetch_note_hearts: async function (note_uid) {
            try {
                const res = await fetch(this.hearts_url_for_note(note_uid));
                if (!res.ok) {
                    return null;
                }
                const data = await res.json();
                if (!data || typeof data !== 'object' || typeof data.tracks !== 'object') {
                    return null;
                }
                return data;
            }
            catch (error) {
                return null;
            }
        },
        load_all_hearts: async function () {
            const media_notes = this.notes.filter(note => {
                return (note.files || []).some(file => is_audio_file(file) || is_video_file(file));
            });
            const hearts_path = this.hearts_path_for_note();
            const results = await Promise.all(media_notes.map(note => {
                if (!(note.files || []).some(file => file.path === hearts_path)) {
                    return null;
                }
                return this.fetch_note_hearts(note.uid);
            }));
            const next = {};
            media_notes.forEach((note, i) => {
                next[note.uid] = results[i] || {version: 1, tracks: {}};
            });
            this.notes_hearts = next;
        },
        save_note_hearts: async function (note_uid, data) {
            const payload = JSON.stringify({version: 1, tracks: data.tracks || {}});
            const blob = new Blob([payload], {type: 'application/json'});
            const fd = new FormData();
            fd.append('file', blob, this.hearts_path_for_note());
            try {
                await fetch(`/api/v1/notes/${encodeURIComponent(note_uid)}/files?overwrite=1`, {
                    method: 'POST',
                    body: fd,
                });
            }
            catch (error) {
                console.warn('hearts save error', error);
            }
        },
        heart_track: async function (note_uid, file_path, position, sha256) {
            const current = this.notes_hearts[note_uid] || {version: 1, tracks: {}};
            const existing_track = current.tracks[file_path] || {sha256: null, hearts: []};
            const entry = {
                at: new Date().toISOString(),
                position: Number.isFinite(position) ? Number(position) : 0,
            };
            const updated_track = {
                sha256: sha256 || existing_track.sha256 || null,
                hearts: [...(existing_track.hearts || []), entry],
            };
            const updated = {
                version: 1,
                tracks: {
                    ...current.tracks,
                    [file_path]: updated_track,
                },
            };
            this.notes_hearts = {...this.notes_hearts, [note_uid]: updated};
            await this.save_note_hearts(note_uid, updated);
        },
        note_has_hearts: function (note) {
            const tracks = this.notes_hearts[note.uid]?.tracks || {};
            for (const entry of Object.values(tracks)) {
                if (entry?.hearts?.length > 0) {
                    return true;
                }
            }
            return false;
        },
        refresh: async function () {
            const notes = await api_notes_list().then(v => v.items);
            this.notes = this.merge_notes_from_backend(notes);
            this.prune_selected_tags();
            this.load_all_hearts();
        },
        merge_notes_from_backend: function (notes) {
            const local_by_uid = new Map(this.notes.map(note => [note.uid, note]));
            const pending_removals = new Set(this.pending_note_removals);
            notes = notes
                .filter(note => !pending_removals.has(note.uid))
                .map(note => this.note_without_pending_file_removals(note));
            const backend_uids = new Set(notes.map(note => note.uid));
            const pending = this.notes.filter(note => {
                return !backend_uids.has(note.uid) && note.pending_create;
            });
            const merged = notes.map(note => {
                const local = local_by_uid.get(note.uid);
                if (!local) {
                    return note;
                }
                if (local.pending_update_revision || local.pending_create || this.editing_note?.uid === note.uid) {
                    return this.note_without_pending_file_removals(local);
                }
                return note;
            });
            return [...pending, ...merged];
        },
        file_removal_key: function (note_uid, path) {
            return JSON.stringify([note_uid, path]);
        },
        note_without_pending_file_removals: function (note) {
            const pending = new Set(this.pending_file_removals);
            const files = (note.files || []).filter(file => !pending.has(this.file_removal_key(note.uid, file.path)));
            if (files.length === (note.files || []).length) {
                return note;
            }
            return {...note, files};
        },
        refresh_jobs: async function () {
            clearTimeout(this.jobs_refresh_timer);
            this.jobs_refresh_timer = null;
            const data = await api_jobs_list();
            const items = data.items || [];
            const has_new_terminal_job = this.jobs_loaded && items.some(job => {
                if (!['finished', 'failed'].includes(job.bucket)) {
                    return false;
                }
                return !this.seen_terminal_job_uids.includes(job.uid);
            });

            this.jobs = items;
            this.jobs_loaded = true;
            this.seen_terminal_job_uids = Array.from(new Set([
                ...this.seen_terminal_job_uids,
                ...items.filter(job => ['finished', 'failed', 'confirmed'].includes(job.bucket)).map(job => job.uid),
            ]));

            if (has_new_terminal_job) {
                await this.refresh();
            }
        },
        schedule_refresh_jobs: function () {
            clearTimeout(this.jobs_refresh_timer);
            this.jobs_refresh_timer = setTimeout(this.refresh_jobs, 250);
        },
        connect_jobs_events: function () {
            if (!window.EventSource) {
                this.jobs_poll_timer = setInterval(this.refresh_jobs, 2500);
                return;
            }
            this.jobs_event_source = new EventSource('/api/v1/jobs/events');
            this.jobs_event_source.addEventListener('jobs_changed', () => {
                this.schedule_refresh_jobs();
            });
        },
        disconnect_jobs_events: function () {
            if (this.jobs_event_source) {
                this.jobs_event_source.close();
                this.jobs_event_source = null;
            }
            clearInterval(this.jobs_poll_timer);
            this.jobs_poll_timer = null;
            clearTimeout(this.jobs_refresh_timer);
            this.jobs_refresh_timer = null;
        },
        reset: function () {
            this.new_body = '';
            this.editing_note = null;
        },
        optimistic_note: function ({uid, body, files = [], pending_create = false}) {
            const now = new Date().toISOString();
            return {
                uid,
                name: '',
                body: body.toString().trim() + '\n',
                prefix: `/r/${uid}/`,
                files,
                created_at: now,
                updated_at: now,
                pending_create,
            };
        },
        note_create_start: function ({uid, body, files = []}) {
            this.notes = [
                this.optimistic_note({uid, body, files, pending_create: true}),
                ...this.notes.filter(note => note.uid !== uid),
            ];
        },
        note_create_done: function ({uid, note_uid, body, files = []}) {
            const note = this.optimistic_note({uid: note_uid, body, files});
            this.notes = this.notes.map(v => v.uid === uid ? note : v);
        },
        note_create_fail: function ({uid}) {
            this.notes = this.notes.filter(note => note.uid !== uid);
        },
        select_notes_overview: async function (note_uid) {
            await this.$refs.list?.scroll_to(note_uid);
            this.active_note = this.notes.find(v => v.uid === note_uid);
        },
        toggle_tag_picker: async function () {
            this.tag_picker_open = !this.tag_picker_open;
            if (this.tag_picker_open) {
                await this.$nextTick();
                this.$refs.tag_search?.focus();
                this.$refs.tag_search?.select();
            }
        },
        close_tag_picker_on_outside_click: function (event) {
            if (!this.tag_picker_open) {
                return;
            }
            if (this.$refs.tag_picker_wrap?.contains(event.target)) {
                return;
            }
            this.tag_picker_open = false;
        },
        select_first_visible_tag: function () {
            const tag = this.visible_tags[0];
            if (tag) {
                this.toggle_include_tag(tag.name);
            }
        },
        toggle_include_tag: function (tag) {
            if (this.selected_tags.includes(tag)) {
                this.selected_tags = this.selected_tags.filter(value => value !== tag);
                return;
            }
            this.selected_tags = [...this.selected_tags, tag].sort((a, b) => a.localeCompare(b));
            this.excluded_tags = this.excluded_tags.filter(value => value !== tag);
        },
        toggle_exclude_tag: function (tag) {
            if (this.excluded_tags.includes(tag)) {
                this.excluded_tags = this.excluded_tags.filter(value => value !== tag);
                return;
            }
            this.excluded_tags = [...this.excluded_tags, tag].sort((a, b) => a.localeCompare(b));
            this.selected_tags = this.selected_tags.filter(value => value !== tag);
        },
        clear_filters: function () {
            this.selected_tags = [];
            this.excluded_tags = [];
            this.note_query = '';
        },
        toggle_tag_sort: function () {
            this.tag_sort = this.tag_sort === 'count' ? 'name' : 'count';
        },
        prune_selected_tags: function () {
            const found = new Set(this.all_tags.map(tag => tag.name));
            const selected_tags = this.selected_tags.filter(tag => found.has(tag));
            const excluded_tags = this.excluded_tags.filter(tag => found.has(tag));
            if (selected_tags.length !== this.selected_tags.length) {
                this.selected_tags = selected_tags;
            }
            if (excluded_tags.length !== this.excluded_tags.length) {
                this.excluded_tags = excluded_tags;
            }
        },
        change_files: async function (event) {
            const tmp = await api_notes_create({body: this.new_body});
            const note_uid = tmp.uid;
            const files = await get_event_files(event);
            await Promise.all(files.map(file => do_upload_file(note_uid, file)));
            this.reset();
            await this.refresh();
        },
        paste: async function (event) {
            const items = event.clipboardData && event.clipboardData.items;
            if (!items) {
                return;
            }
            let note_uid;
            for (let i = 0; i < items.length; ++i) {
                const item = items[i];
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    if (file) {
                        if (!note_uid) {
                            const tmp = await api_notes_create({body: this.new_body});
                            note_uid = tmp.uid;
                        }
                        await do_upload_file(note_uid, file);
                    }
                }
            }
            await this.refresh();
        },
        click_submit: async function () {
            await api_notes_create({body: this.new_body});
            await this.reset();
            await this.refresh();
        },
        edit_note: async function (note) {
            this.editing_note = JSON.parse(JSON.stringify(note));
        },
        remove_note: async function (note) {
            const index = this.notes.findIndex(v => v.uid === note.uid);
            const removed = this.notes[index];
            if (!this.pending_note_removals.includes(note.uid)) {
                this.pending_note_removals = [...this.pending_note_removals, note.uid];
            }
            this.notes = this.notes.filter(v => v.uid !== note.uid);
            if (this.active_note?.uid === note.uid) {
                this.active_note = null;
            }
            try {
                await api_notes_remove({note_uid: note.uid});
                this.pending_note_removals = this.pending_note_removals.filter(uid => uid !== note.uid);
            }
            catch (error) {
                this.pending_note_removals = this.pending_note_removals.filter(uid => uid !== note.uid);
                if (removed) {
                    this.notes = [
                        ...this.notes.slice(0, index),
                        removed,
                        ...this.notes.slice(index),
                    ];
                }
                throw error;
            }
        },
        save_note_edit: async function () {
            const editing_note = this.editing_note;
            const index = this.notes.findIndex(v => v.uid === editing_note.uid);
            const previous = this.notes[index];
            const revision = `update_${Date.now()}_${Math.random().toString(36).slice(2)}`;
            const updated = {
                ...(previous || editing_note),
                body: editing_note.body.toString().trim() + '\n',
                updated_at: new Date().toISOString(),
                pending_update_revision: revision,
            };

            this.notes = this.notes.map(v => v.uid === editing_note.uid ? updated : v);
            this.reset();

            try {
                await api_notes_update({note_uid: editing_note.uid, body: editing_note.body});
                this.notes = this.notes.map(function (note) {
                    if (note.uid !== editing_note.uid || note.pending_update_revision !== revision) {
                        return note;
                    }
                    const {pending_update_revision, ...clean_note} = note;
                    return clean_note;
                });
            }
            catch (error) {
                const current = this.notes.find(v => v.uid === editing_note.uid);
                if (previous && current?.pending_update_revision === revision) {
                    this.notes = this.notes.map(v => v.uid === previous.uid ? previous : v);
                    if (this.editing_note?.uid !== previous.uid) {
                        this.editing_note = JSON.parse(JSON.stringify(previous));
                    }
                }
                throw error;
            }
        },
        cancel_note_edit: async function () {
            this.editing_note = null;
        },
        remove_note_file: async function (note, file) {
            const key = this.file_removal_key(note.uid, file.path);
            const note_index = this.notes.findIndex(v => v.uid === note.uid);
            const current = this.notes[note_index];
            const file_index = (current?.files || []).findIndex(v => v.path === file.path);
            const removed = file_index === -1 ? null : current.files[file_index];

            if (!this.pending_file_removals.includes(key)) {
                this.pending_file_removals = [...this.pending_file_removals, key];
            }
            this.notes = this.notes.map(function (v) {
                if (v.uid !== note.uid) {
                    return v;
                }
                return {...v, files: (v.files || []).filter(item => item.path !== file.path)};
            });
            if (this.mouseover_note_uid === note.uid && this.mouseover_file_path === file.path) {
                this.mouseover_note_uid = null;
                this.mouseover_file_path = null;
            }

            try {
                await api_notes_remove_file({note_uid: note.uid, filename: file.path});
                this.pending_file_removals = this.pending_file_removals.filter(value => value !== key);
            }
            catch (error) {
                this.pending_file_removals = this.pending_file_removals.filter(value => value !== key);
                if (removed && this.notes.some(v => v.uid === note.uid)) {
                    this.notes = this.notes.map(function (v) {
                        if (v.uid !== note.uid || v.files.some(item => item.path === removed.path)) {
                            return v;
                        }
                        return {
                            ...v,
                            files: [
                                ...v.files.slice(0, file_index),
                                removed,
                                ...v.files.slice(file_index),
                            ],
                        };
                    });
                }
                throw error;
            }
        },
        refresh_preserving_note_files: async function (note) {
            const anchor = this.capture_note_files_scroll_anchor(note);
            await this.refresh();
            await this.restore_note_files_scroll_anchor(anchor);
            this.watch_note_image_loads_for_scroll_anchor(anchor);
        },
        capture_note_files_scroll_anchor: function (note) {
            const elem = this.$refs.list?.note_elem(note.uid)?.querySelector('.note-files');
            if (!elem) {
                return null;
            }
            return {
                note_uid: note.uid,
                top: elem.getBoundingClientRect().top,
            };
        },
        restore_note_files_scroll_anchor: async function (anchor) {
            if (!anchor) {
                return;
            }
            await this.$nextTick();
            await new Promise(requestAnimationFrame);
            this.adjust_note_files_scroll_anchor(anchor);
        },
        adjust_note_files_scroll_anchor: function (anchor) {
            const elem = this.$refs.list?.note_elem(anchor.note_uid)?.querySelector('.note-files');
            if (!elem) {
                return;
            }
            const top = elem.getBoundingClientRect().top;
            window.scrollBy({top: top - anchor.top, left: 0, behavior: 'auto'});
        },
        watch_note_image_loads_for_scroll_anchor: function (anchor) {
            if (!anchor) {
                return;
            }
            const note_elem = this.$refs.list?.note_elem(anchor.note_uid);
            if (!note_elem) {
                return;
            }
            note_elem.querySelectorAll('.note-images img').forEach(img => {
                if (img.complete) {
                    return;
                }
                const adjust = () => requestAnimationFrame(() => this.adjust_note_files_scroll_anchor(anchor));
                img.addEventListener('load', adjust, {once: true});
                img.addEventListener('error', adjust, {once: true});
            });
        },
        play_youtube: function (note, item) {
            this.youtube_player = {
                ...item,
                title: note.name || note.uid,
            };
        },
        open_youtube_source: function () {
            if (this.youtube_player?.url) {
                window.open(this.youtube_player.url, '_blank');
            }
        },
        open_terminal: function (job) {
            this.terminal_job = job;
        },
        close_terminal: function () {
            this.terminal_job = null;
        },
        activate_note: function (note) {
            this.active_note = note;
        },
        deactivate_note: function (note) {
            if (this.active_note?.uid === note.uid) {
                this.active_note = null;
            }
        },
        hover_file: function (note_uid, file_path) {
            this.mouseover_note_uid = note_uid;
            this.mouseover_file_path = file_path;
        },
        set_hover_track: function (note_uid, file_path) {
            this.mouseover_note_uid = note_uid;
            this.mouseover_file_path = file_path;
            if (!note_uid || !file_path) {
                return;
            }
            this.$nextTick(() => {
                const note_elem = this.$refs.list?.note_elem(note_uid);
                const row = note_elem?.querySelector(`[data-file-path="${CSS.escape(file_path)}"]`);
                row?.scrollIntoView({block: 'nearest', behavior: 'smooth'});
            });
        },
    },
    created: async function () {
        await this.refresh();
        this.$refs.list?.ramp_up();
        await this.refresh_jobs();
    },
    mounted: function () {
        document.addEventListener('click', this.close_tag_picker_on_outside_click);
        this.connect_jobs_events();
    },
    unmounted: function () {
        document.removeEventListener('click', this.close_tag_picker_on_outside_click);
        this.disconnect_jobs_events();
    },
});
app.mixin({
    methods: {
        px,
        pc,
        format_bytes,
        image_file_summary,
        audio_file_summary,
        video_file_summary,
    },
});
</script>
