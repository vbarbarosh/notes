<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apps</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e3e6ee;
    font-family: system-ui, sans-serif;
    color: #232634;
    min-height: 100vh;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  .page-head {
    margin-bottom: 28px;
  }
  .page-head h1 {
    font-size: 1.7rem;
    font-weight: 700;
    color: #3b4273;
    letter-spacing: -0.01em;
  }
  .page-head p {
    margin-top: 4px;
    color: #6b7392;
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }

  .app-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #f7f8fb;
    border: 1px solid #c7cde2;
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 10px #bbb3;
    transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s;
  }
  .app-card:hover {
    box-shadow: 0 4px 18px #abb9ee6e;
    border-color: #9da9db;
    transform: translateY(-2px);
  }

  .app-icon {
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #e5eeff;
    font-size: 26px;
    line-height: 1;
  }

  .app-info { min-width: 0; }
  .app-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: #3b4273;
    margin-bottom: 2px;
  }
  .app-desc {
    font-size: 0.85rem;
    color: #6b7392;
    line-height: 1.35;
  }

  .notice {
    color: #6b7392;
    font-style: italic;
    padding: 24px 4px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="page-head">
    <h1>Apps</h1>
    <p>Pick an app to open.</p>
  </div>
  <div class="grid" id="grid"></div>
  <div class="notice" id="notice" style="display:none"></div>
</div>

<script>
  const grid = document.getElementById('grid');
  const notice = document.getElementById('notice');

  function show_notice(message) {
    notice.textContent = message;
    notice.style.display = 'block';
  }

  function render_app(app) {
    const card = document.createElement('a');
    card.className = 'app-card';
    card.href = app.url;

    const icon_wrap = document.createElement('div');
    icon_wrap.className = 'app-icon';
    icon_wrap.textContent = app.emoji || '📦';

    const info = document.createElement('div');
    info.className = 'app-info';
    const name = document.createElement('div');
    name.className = 'app-name';
    name.textContent = app.name;
    const desc = document.createElement('div');
    desc.className = 'app-desc';
    desc.textContent = app.desc || '';
    info.appendChild(name);
    info.appendChild(desc);

    card.appendChild(icon_wrap);
    card.appendChild(info);
    return card;
  }

  async function load_apps() {
    let apps;
    try {
      const res = await fetch('apps.json');
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      apps = await res.json();
    } catch (error) {
      console.error('Could not load apps.json:', error);
      show_notice('Could not load the app catalog.');
      return;
    }

    if (!Array.isArray(apps) || !apps.length) {
      show_notice('No apps available yet.');
      return;
    }

    for (const app of apps) {
      grid.appendChild(render_app(app));
    }
  }

  load_apps();
</script>

</body>
</html>
